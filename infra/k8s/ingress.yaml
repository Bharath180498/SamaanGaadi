apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: porter-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 16m
spec:
  ingressClassName: nginx
  rules:
    - host: api.porterx.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: porter-backend
                port:
                  number: 3001
    - host: ops.porterx.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: porter-admin
                port:
                  number: 3000
