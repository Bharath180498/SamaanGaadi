apiVersion: apps/v1
kind: Deployment
metadata:
  name: porter-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: porter-backend
  template:
    metadata:
      labels:
        app: porter-backend
    spec:
      containers:
        - name: backend
          image: porter/backend:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: porter-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: porter-secrets
                  key: redis-url
---
apiVersion: v1
kind: Service
metadata:
  name: porter-backend
spec:
  selector:
    app: porter-backend
  ports:
    - name: http
      port: 3001
      targetPort: 3001
