version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: porter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: porter
      POSTGRES_USER: porter
      POSTGRES_PASSWORD: porter
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: porter-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: porter-backend
    depends_on:
      - postgres
      - redis
    env_file:
      - apps/backend/.env.example
    environment:
      DATABASE_URL: postgresql://porter:porter@postgres:5432/porter?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 3001
    ports:
      - '3001:3001'

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: porter-admin
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - '3000:3000'

volumes:
  postgres_data:
